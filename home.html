<!DOCTYPE html>
<HTML LANG="bg">
    <meta charset="UTF-8">
    <head>
        <link rel="stylesheet" href="style.css">
        <title>Джулюница</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
    <header class="site-header">
            <div class="logo">
                <img src="images/logo.png" width="150" class="logo-image">
            </div>
        <div class="header-text">   
            <h1>Джулюница</h1> 
            <p>Кирилица без грешки</p>
        </div>

        <nav class="nav-menu">
            <button onclick="showCategory('all')">Всички</button>
            <button onclick="showCategory('serif')">Серифни</button>
            <button onclick="showCategory('sans')">Безсерифни</button>
            <button onclick="showCategory('display')">Декоративни</button>
        </nav>
    </header>

        <main>
            <div class="layout">
                <!-- Filtering sidebar (to the left)-->
                <aside class="sidebar">
                 <div class="filter">
                    <h3>Филтри</h3>

                    <h4>Комбинация</h4>
                    <label><input type="checkbox" class="filter-combo" value="serif-sans"> Серифен + Безсерифен</label><br>
                    <label><input type="checkbox" class="filter-combo" value="sans-sans"> Безсерифен + Безсерифен</label><br>
                    <label><input type="checkbox" class="filter-combo" value="serif-serif"> Серифен + Серифен</label><br>

                    <h4>Стил</h4>
                    <label><input type="checkbox" class="filter-style" value="modern"> Модерен</label><br>
                    <label><input type="checkbox" class="filter-style" value="minimal"> Минималистичен</label><br>
                    <label><input type="checkbox" class="filter-style" value="elegant"> Елегантен</label><br>
                    <label><input type="checkbox" class="filter-style" value="bold"> Смел</label><br>

                    <h4>Кирилица</h4>
                    <label><input type="checkbox" id="cyrillic-only"> Само с поддръжка на кирилица</label><br>

                    <h4>Подходящ за</h4>
                    <label><input type="checkbox" class="filter-use" value="web"> Уебсайтове</label><br>
                    <label><input type="checkbox" class="filter-use" value="logo"> Лого</label><br>
                    <label><input type="checkbox" class="filter-use" value="social"> Социални мрежи</label><br>
                    <label><input type="checkbox" class="filter-use" value="presentation"> Презентации</label><br>
                    <button onclick="applyFilters()">Приложи</button><br>   
                 </div>
             </aside>   
                <!-- Products area (to the right)-->
            <div class="products-area">
                <div class="category-header">
                    <div class="category-info">
                        <div id="category-title"></div>
                        <div id="category-description"></div>
                    </div>

                    <div class="sort-dropdown">
                        <label for="sort-select">Sort:</label>
                        <select id="sort-select">
                            <option value="">По подразбиране</option>
                            <option value="az">A → Z</option>
                            <option value="za">Z → A</option>
                            <option value="popular">Най-популярни</option>
                            <option value="modern">Най-модерни</option>
                        </select>
                    </div>
                </div>

                <div id="product-count"></div>

                <div id="product-list" class="product-grid"></div>

                <button id="load-more" onclick="loadMore()">Load More</button>

            </div>
            </div>
        </main>
        <script src="fonts_list.js"></script>
        <script src="main.js"></script>

        <footer class="footer">
            <div class="footer-container">
            <p class="footer-text">Кирилица без грешки — платформа за шрифтове и комбинации на български език.</p>

            <div class="footer-links">
                <a href="contact.html">Контакти</a>
                <a href="about.html">За проекта</a>
                <a href="privacy.html">Политика за поверителност</a>
            </div>
                </div>
            </div>
        </footer>
    </body>
</HTML>
