<!DOCTYPE html>
<HTML LANG="en">
    <meta charset="UTF-8">
    <head>
        <link rel="stylesheet" href="style.css">
        <title>The Fashion Store – Bags &amp; Shoes</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
    <header class="site-header">
            <div class="logo">
                <img src="images/logo.png" width="150" class="logo-image">
            </div>
        <div class="header-text">   
         <!--  <h1>E-commerce</h1> -->
            <p>The Fashion Store</p>
        </div>

        <nav class="nav-menu">
            <button onclick="showCategory('bags')">Bags</button>
            <button onclick="showCategory('shoes')">Shoes</button>
        </nav>
    </header>

        <main>
            <div class="layout">
                <!-- Filtering sidebar (to the left)-->
                <aside class="sidebar">
                 <div class="filter">
                    <h3>Filters</h3>

                    <h4>Color</h4>
                    <label><input type="checkbox" class="filter-color" value="black">Black</label><br>
                    <label><input type="checkbox" class="filter-color" value="brown">Brown</label><br>

                    <h4>Price Range</h4>
                    <label><input type="checkbox" class="filter-price" value="low">Low</label><br>
                    <label><input type="checkbox" class="filter-price" value="medium">Medium</label><br>
                    <label><input type="checkbox" class="filter-price" value="high">High</label><br>

                    <h4>Other</h4>
                    <label><input type="checkbox" id="discount-only"> Discounted Only</label><br>

                    <button onclick="applyFilters()">Apply</button><br>   
                 </div>
             </aside>   
                <!-- Products area (to the right)-->
            <div class="products-area">
                <div class="category-header">
                    <div class="category-info">
                        <div id="category-title"></div>
                        <div id="category-description"></div>
                    </div>

                    <div class="sort-dropdown">
                        <label for="sort-select">Sort:</label>
                        <select id="sort-select">
                            <option value="">Default</option>
                            <option value="az">Alphabetical (A-Z)</option>
                            <option value="za">Alphabetical (Z-A)</option>
                            <option value="priceLow">Price (Low to High)</option>
                            <option value="priceHigh">Price (High to Low)</option>
                        </select>
                    </div>
                </div>

                <div id="product-count"></div>

                <div id="product-list" class="product-grid"></div>

                <button id="load-more" onclick="loadMore()">Load More</button>

            </div>
            </div>
        </main>
        <script src="products_list.js"></script>
        <script src="main.js"></script>

        <footer class="footer">
            <div class="footer-container">
                <p class="footer-text">The Fashion Store. All rights reserved.</p>

                <div class="footer-links">
                    <a href="#">Contact Us</a>
                    <a href="#">Privacy Policy</a>
                    <a href="#">Terms of Service</a>
                </div>
            </div>
        </footer>
    </body>
</HTML>
